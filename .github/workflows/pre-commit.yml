name: pre-commit

on:
  pull_request:

jobs:
  pre-commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - run: uv sync

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: brookie-web/package-lock.json

      - run: npm ci --prefix brookie-web

      - run: uv run pre-commit run --all-files --show-diff-on-failure
