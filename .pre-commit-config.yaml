repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.20
    hooks:
      - id: ruff-check
        args: [--fix]
      - id: ruff-format

  - repo: local
    hooks:
      - id: pyright
        name: pyright
        entry: uv run pyright
        language: system
        types: [python]
        pass_filenames: false

      - id: eslint
        name: eslint
        entry: npm --prefix brookie-web run lint
        language: system
        files: ^brookie-web/.*\.(js|jsx|ts|tsx)$
        pass_filenames: false

      - id: prettier
        name: prettier
        entry: npm --prefix brookie-web run format
        language: system
        files: ^brookie-web/.*\.(js|jsx|ts|tsx|css|json|md)$
        pass_filenames: false
